name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging
        run: npm run build:staging

      - name: Setup SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to staging.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          external_repository: varo-cloud/staging.github.io
          publish_branch: main
          publish_dir: dist
